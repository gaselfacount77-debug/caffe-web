<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Senja - Premium Order</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <header>
        <h1>☕ Gaself Caffe</h1>
        <p>Nikmati kopi terbaik dari hati</p>
    </header>

    <div class="filter-container">
        <button class="btn-filter active" onclick="filterMenu('semua', this)">Semua</button>
        <button class="btn-filter" onclick="filterMenu('kopi', this)">Kopi</button>
        <button class="btn-filter" onclick="filterMenu('makanan', this)">Makanan</button>
    </div>

    <main class="main-content">
        <!-- Daftar Menu -->
        <div class="container" id="menu-container"></div>

        <!-- Sidebar Keranjang -->
        <aside class="cart-sidebar">
            <div class="cart">
                <h3>Pesanan Anda</h3>
                
                <div class="input-group">
                    <label>Nama Pemesan:</label>
                    <input type="text" id="customer-name" placeholder="Masukkan nama..." autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Metode Pembayaran:</label>
                    <select id="payment-method">
                        <option value="Tunai">Tunai / Kasir</option>
                        <option value="QRIS">QRIS / E-Wallet</option>
                        <option value="Transfer">Transfer Bank</option>
                    </select>
                </div>

                <div id="cart-items">
                    <p class="empty-msg">Belum ada pesanan.</p>
                </div>

                <div class="cart-footer">
                    <div class="total-section">
                        <span>Total:</span>
                        <span id="total-price">Rp 0</span>
                    </div>
                    <button class="btn-checkout" onclick="buatPesanan()">Buat Pesanan</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- MODAL QRIS -->
    <div id="qris-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Scan untuk Membayar</h3>
            <p>Silakan scan QRIS di bawah ini:</p>
            <img src="https://qrserver.com" alt="QRIS Code">
            <p id="qris-total" style="font-weight: bold; font-size: 1.2rem; margin-top: 10px;"></p>
            <button class="btn-add" onclick="orderSelesai()">Sudah Bayar</button>
        </div>
    </div>

    <script>
        const menu = [
            { id: 1, nama: "Espresso", harga: 15000, kategori: "kopi", img: "☕" },
            { id: 2, nama: "Cappuccino", harga: 25000, kategori: "kopi", img: "☕" },
            { id: 3, nama: "Latte", harga: 22000, kategori: "kopi", img: "☕" },
            { id: 4, nama: "Croissant", harga: 18000, kategori: "makanan", img: "🥐" },
            { id: 5, nama: "Club Sandwich", harga: 30000, kategori: "makanan", img: "🥪" }
        ];

        let cart = {};

        function renderMenu(kat = 'semua') {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            const filtered = kat === 'semua' ? menu : menu.filter(m => m.kategori === kat);
            filtered.forEach(item => {
                container.innerHTML += `
                    <div class="menu-item">
                        <div class="item-img">${item.img}</div>
                        <h3>${item.nama}</h3>
                        <p class="price">Rp ${item.harga.toLocaleString()}</p>
                        <button class="btn-add" onclick="changeQty(${item.id}, 1)">Tambah</button>
                    </div>
                `;
            });
        }

        function filterMenu(kat, btn) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(kat);
        }

        function changeQty(id, delta) {
            if (!cart[id]) { if (delta > 0) cart[id] = 1; } 
            else { cart[id] += delta; if (cart[id] <= 0) delete cart[id]; }
            updateCart();
        }

        function updateCart() {
            const cartList = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('total-price');
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                cartList.innerHTML = '<p class="empty-msg">Belum ada pesanan.</p>';
                totalDisplay.innerText = 'Rp 0';
                return;
            }
            cartList.innerHTML = '';
            let total = 0;
            keys.forEach(id => {
                const item = menu.find(m => m.id == id);
                total += item.harga * cart[id];
                cartList.innerHTML += `
                    <div class="cart-item">
                        <div class="item-info"><strong>${item.nama}</strong><span>Rp ${item.harga.toLocaleString()}</span></div>
                        <div class="qty-control">
                            <button onclick="changeQty(${id}, -1)">-</button><span>${cart[id]}</span><button onclick="changeQty(${id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            totalDisplay.innerText = `Rp ${total.toLocaleString()}`;
        }

        function buatPesanan() {
            const nama = document.getElementById('customer-name').value;
            const metode = document.getElementById('payment-method').value;
            const total = document.getElementById('total-price').innerText;
            if (!nama) return alert("Masukkan nama pemesan!");
            if (Object.keys(cart).length === 0) return alert("Keranjang kosong!");

            if (metode === "QRIS") {
                document.getElementById('qris-total').innerText = "Total: " + total;
                document.getElementById('qris-modal').style.display = "block";
            } else {
                alert(`Pesanan diterima!\nNama: ${nama}\nMetode: ${metode}\nTotal: ${total}`);
                orderSelesai();
            }
        }

        function orderSelesai() {
            cart = {};
            document.getElementById('customer-name').value = '';
            document.getElementById('qris-modal').style.display = "none";
            updateCart();
            alert("Pesanan Anda sedang diproses!");
        }

        function closeModal() { document.getElementById('qris-modal').style.display = "none"; }
        renderMenu();
    </script>
</body>
</html>
